<head>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyC_U94Cy-rx0pgh2vWcuuM9cuj8PNWzpDk",
  authDomain:"atlas-de-la-creation.firebaseapp.com",
  projectId:"atlas-de-la-creation",
  storageBucket:"atlas-de-la-creation.firebasestorage.app",
  messagingSenderId:"641852939635",
  appId:"1:641852939635:web:48273ca3eaea29fdebf906"
});
var _db = firebase.firestore();
var _auth = firebase.auth();
var _uid = null;
var _loaded = false;

function saveNow() {
  if (!_uid) return;
  _db.collection("users").doc(_uid).collection("pages").doc("chronologie").set({
    events: JSON.stringify(EVENTS),
    eres: JSON.stringify(ERES),
    updatedAt: new Date().toISOString()
  }).then(function(){ showToast("Sauvegarde OK"); })
  .catch(function(e){ console.log("Save error:", e); });
}

_auth.onAuthStateChanged(function(user) {
  if (!user) { window.location.href = "index.html"; return; }
  _uid = user.uid;
  if (_loaded) return;
  _loaded = true;
  _db.collection("users").doc(_uid).collection("pages").doc("chronologie").get()
    .then(function(snap) {
      if (snap.exists) {
        var d = snap.data();
        if (d.eres)   try { ERES = JSON.parse(d.eres); } catch(e){}
        if (d.events) try {
          var evs = JSON.parse(d.events);
          EVENTS.splice(0, EVENTS.length);
          evs.forEach(function(ev){ EVENTS.push(ev); });
        } catch(e){}
      }
      renderEreTabs();
      renderFrise();
    }).catch(function() { renderEreTabs(); renderFrise(); });
});
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f9f6f0;--warm-white:#fdfbf7;--ink:#1a1714;--ink-light:#3d3830;
  --ink-faint:#8a8278;--gold:#b8975a;--gold-light:#d4b07a;
  --gold-pale:rgba(184,151,90,0.09);--border:#e4ddd3;--border-strong:#c8bfb3;
  --c-guerre:#9e5a5a;--c-decouverte:#5a7e9e;--c-mort:#3d3830;
  --c-politique:#b8975a;--c-magie:#7a5a9e;--c-naissance:#5a8e6a;
}
html,body{height:100%;background:var(--cream);color:var(--ink);font-family:"Jost",sans-serif;font-weight:300;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}

header{height:60px;flex-shrink:0;background:rgba(249,246,240,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;z-index:400}
.hl{display:flex;align-items:center;gap:18px}
.back{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);text-decoration:none;transition:color .2s}
.back:hover{color:var(--gold)}
.hdiv{width:1px;height:18px;background:var(--border)}
.logo{font-family:"Cormorant Garamond",serif;font-size:17px;font-weight:500;letter-spacing:.06em}
.logo span{font-style:italic;color:var(--gold);margin-right:8px;font-size:22px}
.bnew{padding:7px 16px;background:var(--ink);color:var(--cream);border:none;cursor:pointer;font-family:"Jost",sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;transition:background .2s}
.bnew:hover{background:var(--gold)}

.ere-bar{display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--border);background:var(--warm-white);gap:0;overflow-x:auto;flex-shrink:0;min-height:44px}
.etab{padding:12px 0;margin-right:20px;background:none;border:none;cursor:pointer;font-family:"Jost",sans-serif;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);position:relative;white-space:nowrap;transition:color .2s}
.etab.active{color:var(--ink)}
.etab::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:1.5px;background:var(--gold);transform:scaleX(0);transition:transform .3s}
.etab.active::after{transform:scaleX(1)}
.ewrap{display:flex;align-items:center}
.edel{background:none;border:none;cursor:pointer;font-size:11px;color:var(--border-strong);padding:2px 4px;transition:color .2s;line-height:1}
.edel:hover{color:#9e5a5a}
.eadd{background:none;border:1px dashed var(--border-strong);padding:4px 10px;cursor:pointer;font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);transition:all .2s;white-space:nowrap;margin-left:8px}
.eadd:hover{border-color:var(--gold);color:var(--gold)}

.toolbar{background:var(--warm-white);border-bottom:1px solid var(--border);padding:8px 28px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
.tlab{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}
.fbtn{padding:4px 11px;border:1px solid var(--border);background:none;cursor:pointer;font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.08em;color:var(--ink-faint);transition:all .2s;display:flex;align-items:center;gap:5px}
.fbtn .fd{width:6px;height:6px;border-radius:50%}
.fbtn.active{background:var(--gold-pale);border-color:var(--gold-light);color:var(--gold)}
.tsep{width:1px;height:18px;background:var(--border)}
.tsel{background:var(--cream);border:1px solid var(--border);padding:4px 9px;font-family:"Jost",sans-serif;font-size:10.5px;color:var(--ink-faint);outline:none;-webkit-appearance:none}

.frise-outer{flex:1;overflow:hidden;position:relative}
.frise-scroll{width:100%;height:100%;overflow-x:auto;overflow-y:hidden;padding:0 28px;display:flex;align-items:flex-start;cursor:grab;user-select:none}
.frise-scroll:active{cursor:grabbing}
.frise-scroll::-webkit-scrollbar{height:4px}
.frise-scroll::-webkit-scrollbar-thumb{background:var(--border)}
.frise-inner{display:flex;align-items:flex-start;min-width:max-content;padding:40px 0 20px;position:relative}
.frise-line{position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border);transform:translateY(60px);z-index:0;pointer-events:none}

.era-block{display:flex;flex-direction:column;align-items:flex-start;padding:0 12px;margin-top:48px;flex-shrink:0}
.era-name{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px;white-space:nowrap}
.era-line{width:1px;height:70px;background:var(--border)}

.evcol{display:flex;flex-direction:column;align-items:center;position:relative;margin:0 8px}
.evcol.below{flex-direction:column-reverse}
.evcard{width:195px;background:var(--warm-white);border:1px solid var(--border);padding:13px 15px;cursor:pointer;position:relative;transition:border-color .25s,transform .2s,box-shadow .25s;margin-bottom:12px}
.evcol.below .evcard{margin-bottom:0;margin-top:12px}
.evcard:hover{border-color:var(--border-strong);transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,23,20,.06)}
.evcard::before{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:var(--evcolor,var(--gold))}
.evbadge{font-size:9px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
.evtitle{font-family:"Cormorant Garamond",serif;font-size:15px;font-weight:500;color:var(--ink);margin-bottom:3px;line-height:1.3}
.evdate{font-size:10px;letter-spacing:.06em;color:var(--ink-faint);margin-bottom:5px}
.evdesc{font-size:11px;font-weight:300;color:var(--ink-faint);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.evtags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.evtag{font-size:9px;padding:2px 6px;border:1px solid var(--border);color:var(--border-strong)}
.evdel{position:absolute;top:6px;right:6px;background:#9e5a5a;border:none;cursor:pointer;width:18px;height:18px;border-radius:50%;color:white;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;line-height:1;padding:0}
.evcard:hover .evdel{opacity:1}
.evconn{width:1px;background:var(--border);height:20px;flex-shrink:0}
.evdot{width:11px;height:11px;border-radius:50%;border:2px solid var(--cream);flex-shrink:0;z-index:2;transition:transform .2s}
.evcol:hover .evdot{transform:scale(1.4)}
.evyear{font-size:10px;margin-top:6px;letter-spacing:.04em}
.evcol.below .evyear{margin-top:0;margin-bottom:6px}
.addcol{display:flex;flex-direction:column;align-items:center;gap:8px;margin:0 20px;cursor:pointer;opacity:.5;transition:opacity .2s}
.addcol:hover{opacity:1}
.addcircle{width:30px;height:30px;border-radius:50%;border:1.5px dashed var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--gold);margin-top:48px}
.addlabel{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);white-space:nowrap}

.dp{position:fixed;right:0;top:60px;bottom:0;width:310px;background:var(--warm-white);border-left:1px solid var(--border);z-index:250;transform:translateX(100%);transition:transform .35s;display:flex;flex-direction:column}
.dp.open{transform:translateX(0)}
.dp-hd{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between}
.dp-type{font-size:9px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px}
.dp-title{font-family:"Cormorant Garamond",serif;font-size:19px;font-weight:400;color:var(--ink);line-height:1.2}
.dp-date{font-size:11px;color:var(--ink-faint);margin-top:3px}
.dp-x{background:none;border:none;cursor:pointer;font-size:17px;color:var(--ink-faint);flex-shrink:0}
.dp-body{flex:1;overflow-y:auto;padding:16px 18px}
.dp-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin:12px 0 6px;display:flex;align-items:center;gap:8px}
.dp-lbl::after{content:"";flex:1;height:1px;background:var(--border)}
.dp-txt{font-size:13px;font-weight:300;color:var(--ink-light);line-height:1.8;outline:none;min-height:36px;border-bottom:1px solid transparent;transition:border-color .2s;cursor:text}
.dp-txt:hover{border-color:var(--gold-light)}
.dp-txt:focus{border-color:var(--gold)}
.dp-foot{padding:10px 18px;border-top:1px solid var(--border)}
.dp-delbtn{width:100%;padding:8px;background:none;border:1px solid var(--border);cursor:pointer;font-family:"Jost",sans-serif;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#9e5a5a;transition:all .2s}
.dp-delbtn:hover{border-color:#9e5a5a;background:rgba(158,90,90,.06)}

.mover{position:fixed;inset:0;background:rgba(26,23,20,.5);backdrop-filter:blur(4px);z-index:600;display:none;align-items:center;justify-content:center}
.mover.open{display:flex}
.modal{background:var(--warm-white);border:1px solid var(--border);width:460px;max-height:90vh;overflow-y:auto}
.mhd{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mtit{font-family:"Cormorant Garamond",serif;font-size:19px;font-weight:400}
.mx{background:none;border:none;cursor:pointer;font-size:17px;color:var(--ink-faint)}
.mbody{padding:18px 22px;display:grid;gap:13px}
.mf label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:5px}
.mf input,.mf select,.mf textarea{width:100%;padding:8px 11px;background:var(--cream);border:1px solid var(--border);font-family:"Jost",sans-serif;font-size:13px;font-weight:300;color:var(--ink);outline:none;transition:border-color .2s;-webkit-appearance:none;resize:vertical}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--gold)}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.topt{padding:9px 6px;border:1px solid var(--border);cursor:pointer;text-align:center;background:none;transition:all .2s}
.topt.sel{border-color:var(--tc);background:color-mix(in srgb,var(--tc) 9%,transparent)}
.topticon{font-size:19px;display:block;margin-bottom:3px}
.toptlbl{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint)}
.topt.sel .toptlbl{color:var(--tc)}
.mfoot{padding:12px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.bcancel{padding:7px 14px;background:none;border:1px solid var(--border);cursor:pointer;font-family:"Jost",sans-serif;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}
.bsave{padding:7px 16px;background:var(--ink);border:none;cursor:pointer;font-family:"Jost",sans-serif;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--cream);transition:background .2s}
.bsave:hover{background:var(--gold)}

.dover{position:fixed;inset:0;background:rgba(26,23,20,.55);backdrop-filter:blur(4px);z-index:9999;display:none;align-items:center;justify-content:center}
.dover.open{display:flex}
.dbox{background:var(--warm-white);border:1px solid var(--border);padding:28px 32px;max-width:360px;width:92%;text-align:center}
.dtit{font-family:"Cormorant Garamond",serif;font-size:21px;font-weight:400;color:var(--ink);margin-bottom:8px}
.dmsg{font-size:12.5px;font-weight:300;color:var(--ink-faint);line-height:1.7;margin-bottom:22px}
.dbtns{display:flex;gap:8px;justify-content:center}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:var(--cream);padding:9px 18px;font-size:11.5px;letter-spacing:.06em;display:flex;align-items:center;gap:7px;opacity:0;transition:transform .3s,opacity .3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.tdot{width:5px;height:5px;background:var(--gold);border-radius:50%}

@media(max-width:768px){
  .frise-scroll{padding:0 12px}
  .evcard{width:155px;padding:10px 11px}
  .evtitle{font-size:13px}
  .evdel{opacity:1}
  .edel{opacity:1}
  .mover.open{align-items:flex-end}
  .modal{width:100%;border-radius:12px 12px 0 0}
  header{padding:0 14px}
  .toolbar,.ere-bar{padding:6px 12px;overflow-x:auto;flex-wrap:nowrap}
  .fbtn,.tsel,.etab{font-size:9.5px;white-space:nowrap}
  .dp{width:100%;top:auto;bottom:0;border-left:none;border-top:1px solid var(--border);border-radius:14px 14px 0 0;height:65vh}
  .dp.open{transform:translateY(0)}
  .dp:not(.open){transform:translateY(100%)}
}
</style>
</head>
<body>

<header>

<!-- MODAL EVENEMENT -->
<div class="mover" id="evModal">

    <div class="mhd">

      <button class="mx" id="evClose">&#10005;</button>
    </div>
    <div class="mbody">
      <div class="mf">
        <label>Type</label>
        <div class="tgrid" id="typeGrid">
          <button class="topt sel" data-type="guerre" style="--tc:var(--c-guerre)"><span class="topticon">&#9876;</span><span class="toptlbl">Guerre</span></button>
          <button class="topt" data-type="decouverte" style="--tc:var(--c-decouverte)"><span class="topticon">&#128301;</span><span class="toptlbl">Decouverte</span></button>
          <button class="topt" data-type="magie" style="--tc:var(--c-magie)"><span class="topticon">&#10022;</span><span class="toptlbl">Magie</span></button>
          <button class="topt" data-type="politique" style="--tc:var(--c-politique)"><span class="topticon">&#128081;</span><span class="toptlbl">Politique</span></button>
          <button class="topt" data-type="mort" style="--tc:var(--c-mort)"><span class="topticon">&#128128;</span><span class="toptlbl">Mort</span></button>

<!-- MODAL ERE -->
<div class="mover" id="ereModal">
  <div class="modal" style="width:340px">
    <div class="mhd">
      <div class="mtit">Nouvelle ere</div>
      <button class="mx" id="ereClose">&#10005;</button>
    </div>
    <div class="mbody">
      <div class="mf"><label>Nom</label><input type="text" id="ereName" placeholder="Ex : Ere des Brumes"></div>
    </div>
    <div class="mfoot">
      <button class="bcancel" id="ereCancel">Annuler</button>
      <button class="bsave" id="ereSave">Creer</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="dover" id="dover">
  <div class="dbox">
    <div class="dtit" id="dtit">Supprimer ?</div>
    <div class="dmsg" id="dmsg">Cette action est irreversible.</div>
    <div class="dbtns">
      <button class="bcancel" id="dcancel">Annuler</button>
      <button class="bsave" style="background:#9e5a5a" id="dconfirm">Supprimer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="tdot"></div><span id="tmsg">OK</span></div>

<script>
var EVENTS = [];
var ERES   = [];
var activeEre  = "toutes";
var activeType = "tous";
var selType    = "guerre";
var curEvId    = null;
var _dcb       = null;
var _tt;

var COLORS = {guerre:"#9e5a5a",decouverte:"#5a7e9e",mort:"#3d3830",politique:"#b8975a",magie:"#7a5a9e",naissance:"#5a8e6a"};
var LABELS = {guerre:"Guerre",decouverte:"Decouverte",mort:"Mort",politique:"Politique",magie:"Magie",naissance:"Naissance"};

function toast(msg) {
  document.getElementById("tmsg").textContent = msg;
  var t = document.getElementById("toast");
  t.classList.add("show");
  clearTimeout(_tt);
  _tt = setTimeout(function(){ t.classList.remove("show"); }, 2000);
}

// DELETE CONFIRM
function askDel(title, cb) {
  document.getElementById("dtit").textContent = title;
  _dcb = cb;
  document.getElementById("dover").classList.add("open");
}
document.getElementById("dconfirm").onclick = function() {
  document.getElementById("dover").classList.remove("open");
  if (_dcb) { _dcb(); _dcb = null; }
};
document.getElementById("dcancel").onclick = function() {
  document.getElementById("dover").classList.remove("open");
  _dcb = null;
};

// ERE BAR
function renderEreTabs() {
  var bar = document.getElementById("ereBar");
  bar.innerHTML = "";

  var a = document.createElement("button");
  a.className = "etab" + (activeEre === "toutes" ? " active" : "");
  a.textContent = "Toutes";
  a.onclick = function() { activeEre = "toutes"; renderEreTabs(); renderFrise(); };
  bar.appendChild(a);

  ERES.forEach(function(ere) {
    var w = document.createElement("div"); w.className = "ewrap";
    var b = document.createElement("button"); b.className = "etab" + (activeEre === ere.id ? " active" : "");
    b.textContent = ere.name;
    b.onclick = function() { activeEre = ere.id; renderEreTabs(); renderFrise(); };
    var d = document.createElement("button"); d.className = "edel"; d.textContent = "x";
    d.onclick = function(e) {
      e.stopPropagation();
      askDel("Supprimer " + ere.name + " ?", function() {
        ERES = ERES.filter(function(x){ return x.id !== ere.id; });
        if (activeEre === ere.id) activeEre = "toutes";
        renderEreTabs(); renderFrise(); saveNow(); toast("Ere supprimee");
      });
    };
    w.appendChild(b); w.appendChild(d); bar.appendChild(w);
  });

  var add = document.createElement("button"); add.className = "eadd"; add.textContent = "+ Ere";
  add.onclick = function() { openEreModal(); };
  bar.appendChild(add);

  // update ere select
  var sel = document.getElementById("evEre");
  if (!sel) return;
  var cur = sel.value;
  sel.innerHTML = "";
  var def = document.createElement("option"); def.value = "general"; def.textContent = "Sans ere";
  sel.appendChild(def);
  ERES.forEach(function(ere) {
    var o = document.createElement("option"); o.value = ere.id; o.textContent = ere.name;
    sel.appendChild(o);
  });
  if (cur) sel.value = cur;
}

// ERE MODAL
function openEreModal() {
  document.getElementById("ereName").value = "";
  document.getElementById("ereModal").classList.add("open");
  setTimeout(function(){ document.getElementById("ereName").focus(); }, 80);
}
function closeEreModal() { document.getElementById("ereModal").classList.remove("open"); }
document.getElementById("ereClose").onclick  = closeEreModal;
document.getElementById("ereCancel").onclick = closeEreModal;
document.getElementById("ereModal").onclick  = function(e){ if(e.target===this) closeEreModal(); };
document.getElementById("ereSave").onclick   = function() {
  var name = document.getElementById("ereName").value.trim();
  if (!name) return;
  ERES.push({ id: "e" + Date.now(), name: name });
  renderEreTabs(); closeEreModal(); saveNow(); toast("Ere creee !");
};
document.getElementById("ereName").onkeydown = function(e) { if(e.key==="Enter") document.getElementById("ereSave").click(); };

// EVENT MODAL
function openEvModal() {
  document.getElementById("evTitle").value = "";
  document.getElementById("evDate").value  = "";
  document.getElementById("evDesc").value  = "";
  document.getElementById("evTags").value  = "";
  document.getElementById("evPos").value   = "above";
  document.getElementById("evEre").value   = "general";
  document.querySelectorAll(".topt").forEach(function(b){ b.classList.toggle("sel", b.dataset.type === "guerre"); });
  selType = "guerre";
  document.getElementById("evModal").classList.add("open");
  setTimeout(function(){ document.getElementById("evTitle").focus(); }, 80);
}
function closeEvModal() { document.getElementById("evModal").classList.remove("open"); }
document.getElementById("btnNew").onclick   = openEvModal;
document.getElementById("evClose").onclick  = closeEvModal;
document.getElementById("evCancel").onclick = closeEvModal;
document.getElementById("evModal").onclick  = function(e){ if(e.target===this) closeEvModal(); };

document.getElementById("typeGrid").onclick = function(e) {
  var b = e.target.closest(".topt"); if (!b) return;
  document.querySelectorAll(".topt").forEach(function(x){ x.classList.remove("sel"); });
  b.classList.add("sel"); selType = b.dataset.type;
};

document.getElementById("evSave").onclick = function() {
  var title = document.getElementById("evTitle").value.trim();
  if (!title) { document.getElementById("evTitle").style.borderColor = "#9e5a5a"; document.getElementById("evTitle").focus(); return; }
  document.getElementById("evTitle").style.borderColor = "";
  var nid = EVENTS.length > 0 ? Math.max.apply(null, EVENTS.map(function(e){ return e.id; })) + 1 : 1;
  EVENTS.push({
    id: nid, type: selType,
    era:   document.getElementById("evEre").value,
    title: title,
    date:  document.getElementById("evDate").value.trim() || "Date inconnue",
    desc:  document.getElementById("evDesc").value.trim(),
    tags:  document.getElementById("evTags").value.split(",").map(function(t){ return t.trim(); }).filter(Boolean),
    pos:   document.getElementById("evPos").value
  });
  closeEvModal(); renderFrise(); saveNow(); toast("Evenement ajoute !");
};
document.getElementById("evTitle").onkeydown = function(e) { if(e.key==="Enter") document.getElementById("evSave").click(); };

// DETAIL PANEL
document.getElementById("dpClose").onclick = function() {
  document.getElementById("dpanel").classList.remove("open"); curEvId = null;
};
document.getElementById("dpDel").onclick = function() {
  if (!curEvId) return;
  var id = curEvId;
  askDel("Supprimer cet evenement ?", function() {
    var i = EVENTS.findIndex(function(x){ return x.id === id; });
    if (i > -1) EVENTS.splice(i, 1);
    document.getElementById("dpanel").classList.remove("open"); curEvId = null;
    renderFrise(); saveNow(); toast("Supprime !");
  });
};
function openDetail(id) {
  var ev = EVENTS.find(function(e){ return e.id === id; }); if (!ev) return;
  curEvId = id;
  var c = COLORS[ev.type] || "var(--gold)";
  document.getElementById("dpType").textContent  = LABELS[ev.type] || ev.type;
  document.getElementById("dpType").style.color  = c;
  document.getElementById("dpTitle").textContent = ev.title;
  document.getElementById("dpDate").textContent  = ev.date;
  document.getElementById("dpDesc").textContent  = ev.desc || "";
  document.getElementById("dpConseq").textContent = ev.consequences || "";
  document.getElementById("dpanel").classList.add("open");
}
document.getElementById("dpDesc").onblur  = function(){ if(curEvId){ var ev=EVENTS.find(function(e){return e.id===curEvId;}); if(ev){ev.desc=this.textContent;saveNow();} } };
document.getElementById("dpConseq").onblur= function(){ if(curEvId){ var ev=EVENTS.find(function(e){return e.id===curEvId;}); if(ev){ev.consequences=this.textContent;saveNow();} } };

// TYPE FILTERS
document.querySelector(".toolbar").onclick = function(e) {
  var b = e.target.closest(".fbtn"); if (!b) return;
  activeType = b.dataset.type;
  document.querySelectorAll(".fbtn").forEach(function(x){ x.classList.remove("active"); });
  b.classList.add("active"); renderFrise();
};
document.getElementById("linkedSel").onchange = function() { renderFrise(); };

// RENDER FRISE
function renderFrise() {
  var inner = document.getElementById("friseInner");
  inner.innerHTML = "";
  var line = document.createElement("div"); line.className = "frise-line"; inner.appendChild(line);

  var linked = document.getElementById("linkedSel").value;
  var filtered = EVENTS.filter(function(ev) {
    var ereOk    = activeEre  === "toutes" || ev.era  === activeEre;
    var typeOk   = activeType === "tous"   || ev.type === activeType;
    var linkedOk = linked === "tous" || !ev.tags || ev.tags.some(function(t){ return t.toLowerCase().indexOf(linked.toLowerCase()) > -1; });
    return ereOk && typeOk && linkedOk;
  });

  var lastEra = null;
  filtered.forEach(function(ev) {
    if (ev.era !== lastEra) {
      var eName = "Sans ere";
      var ef = ERES.find(function(e){ return e.id === ev.era; });
      if (ef) eName = ef.name;
      var eb = document.createElement("div"); eb.className = "era-block";
      var el = document.createElement("div"); el.className = "era-name"; el.textContent = eName;
      var eli = document.createElement("div"); eli.className = "era-line";
      eb.appendChild(el); eb.appendChild(eli); inner.appendChild(eb);
      lastEra = ev.era;
    }

    var color = COLORS[ev.type] || "#b8975a";
    var col = document.createElement("div");
    col.className = "evcol" + (ev.pos === "below" ? " below" : "");

    var card = document.createElement("div");
    card.className = "evcard";
    card.style.setProperty("--evcolor", color);

    var del = document.createElement("button");
    del.className = "evdel"; del.textContent = "x";
    del.onclick = (function(id) { return function(e) {
      e.stopPropagation();
      askDel("Supprimer ?", function() {
        var i = EVENTS.findIndex(function(x){ return x.id === id; });
        if (i > -1) EVENTS.splice(i, 1);
        renderFrise(); saveNow(); toast("Supprime !");
      });
    }; })(ev.id);

    var badge = document.createElement("div"); badge.className = "evbadge";
    badge.style.color = color; badge.textContent = LABELS[ev.type] || ev.type;
    var tit = document.createElement("div"); tit.className = "evtitle"; tit.textContent = ev.title;
    var dt  = document.createElement("div"); dt.className  = "evdate";  dt.textContent  = ev.date;

    card.appendChild(del); card.appendChild(badge); card.appendChild(tit); card.appendChild(dt);

    if (ev.desc) {
      var d = document.createElement("div"); d.className = "evdesc"; d.textContent = ev.desc;
      card.appendChild(d);
    }
    if (ev.tags && ev.tags.length) {
      var tw = document.createElement("div"); tw.className = "evtags";
      ev.tags.forEach(function(tag){ var t=document.createElement("span"); t.className="evtag"; t.textContent=tag; tw.appendChild(t); });
      card.appendChild(tw);
    }
    card.onclick = (function(id){ return function(){ openDetail(id); }; })(ev.id);

    var conn = document.createElement("div"); conn.className = "evconn";
    var dot  = document.createElement("div"); dot.className  = "evdot"; dot.style.background = color;
    var yr   = document.createElement("div"); yr.className   = "evyear"; yr.style.color = color;
    yr.textContent = ev.date.split("—")[0].trim();

    col.appendChild(card); col.appendChild(conn); col.appendChild(dot); col.appendChild(yr);
    inner.appendChild(col);
  });

  // Add button
  var ac = document.createElement("div"); ac.className = "addcol"; ac.onclick = openEvModal;
  ac.innerHTML = "<div class='addcircle'>+</div><div class='addlabel'>Ajouter</div>";
  inner.appendChild(ac);
}

// DRAG SCROLL
var sc = document.getElementById("friseScroll");
var drag=false, sx, ss;
sc.addEventListener("mousedown", function(e){ drag=true; sx=e.pageX-sc.offsetLeft; ss=sc.scrollLeft; });
window.addEventListener("mouseup",   function(){ drag=false; });
window.addEventListener("mousemove", function(e){ if(!drag)return; e.preventDefault(); sc.scrollLeft=ss-(e.pageX-sc.offsetLeft-sx)*1.2; });

// INIT
renderEreTabs();
renderFrise();
</script>
</body>
</html>
